<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK TECH - Premium POS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0f2f5">
</head>
<body class="fade-in-load">

    <div id="pos-app">
        <header class="app-header premium-glass">
            <div class="brand">
                <div class="logo-container" id="logo-container">
                    <img src="logo.png" alt="PK TECH Logo" class="logo" id="brand-logo" onerror="handleLogoError()">
                </div>
                <div class="brand-info">
                    <h1>PK TECH</h1>
                    <p class="subtitle">ISP & Networking Solution</p>
                    <p class="phone">
                        +880 1750-841314
                    </p>
                </div>
            </div>
            <div class="datetime">
                <div class="date-box" id="current-date">--</div>
                <div class="time-box" id="current-time">--:--:--</div>
            </div>
        </header>

        <main class="main-content">
            <div class="left-col">
                <section class="card customer-card slide-up">
                    <h2 class="card-title">Billing Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Invoice No.</label>
                            <input type="text" id="invoice-no" readonly class="readonly-input">
                        </div>
                        <div class="form-group">
                            <label>Customer Name</label>
                            <input type="text" id="customer-name" placeholder="Walk-in Customer">
                        </div>
                        <div class="form-group">
                            <label>Mobile Number</label>
                            <input type="text" id="customer-mobile" placeholder="017XXXXXXXX">
                        </div>
                    </div>
                </section>

                <section class="card items-card slide-up delay-1">
                    <h2 class="card-title">Cart Items</h2>
                    <div class="table-responsive">
                        <table class="pos-table" id="items-table">
                            <thead>
                                <tr>
                                    <th>Item Name</th>
                                    <th>Qty</th>
                                    <th>Unit Price (৳)</th>
                                    <th>Total (৳)</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="items-body"></tbody>
                        </table>
                    </div>
                    <button class="btn btn-add" onclick="addItemRow()">Add New Item</button>
                </section>
            </div>

            <div class="right-col slide-up delay-2">
                <section class="card summary-card gradient-border">
                    <h2 class="card-title">Order Summary</h2>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="ui-subtotal">৳ 0.00</span>
                    </div>
                    <div class="summary-row grand-total">
                        <span>Grand Total</span>
                        <span id="ui-grand-total">৳ 0.00</span>
                    </div>
                </section>

                <div class="action-buttons">
                    <button class="btn btn-print" onclick="generateReceiptText()">
                        Generate Receipt Text
                    </button>
                    <button class="btn btn-new" onclick="newBill()">New Bill</button>
                </div>

                <!-- নতুন কপি সেকশন -->
                <section class="card" style="margin-top:20px;">
                    <h2 class="card-title">Thermal Copy Area</h2>
                    <textarea id="thermal-receipt-text" style="width: 100%; height: 150px; font-family: monospace; font-size: 12px;" readonly></textarea>
                    <button class="btn" style="width: 100%; margin-top:5px;" onclick="copyToClipboard()">Copy Receipt</button>
                </section>
            </div>
        </main>
    </div>

    <script>
    function generateReceiptText() {
        const invoice = document.getElementById('invoice-no').value;
        const name = document.getElementById('customer-name').value || "Walk-in";
        const mobile = document.getElementById('customer-mobile').value || "N/A";
        let receipt = `----------------------------------------\n`;
        receipt += `PPPP   K   K   TTTTT EEEE  CCC  H  H\n`;
        receipt += `----------------------------------------\n`;
        receipt += `ISP & Networking Solution\nPhone: 01750-841314\n`;
        receipt += `----------------------------------------\n`;
        receipt += `Invoice: ${invoice}\nName: ${name}\nMobile: ${mobile}\n`;
        receipt += `----------------------------------------\n`;
        receipt += `Item            Qty   Unit     Total\n`;
        
        const rows = document.querySelectorAll('#items-body tr');
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            receipt += `${inputs[0].value.padEnd(12)} ${inputs[1].value.padEnd(5)} ${inputs[2].value.padEnd(7)} ${row.cells[3].innerText}\n`;
        });

        receipt += `----------------------------------------\n`;
        receipt += `Grand Total: ${document.getElementById('ui-grand-total').innerText}\n`;
        receipt += `----------------------------------------\n           ** THANK YOU **\n`;
        document.getElementById('thermal-receipt-text').value = receipt;
    }

    function copyToClipboard() {
        const copyText = document.getElementById("thermal-receipt-text");
        copyText.select();
        document.execCommand("copy");
        alert("কপি হয়েছে! এখন RawBT-তে পেস্ট করুন।");
    }
    </script>
    <script src="script.js"></script>
</body>
</html>
