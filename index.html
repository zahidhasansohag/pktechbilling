<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK TECH Billing</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="receipt">

<!-- HEADER -->

<div class="header">

<img src="logo.png" class="logo">

<h1>PK TECH</h1>

<p>ISP & Networking Solution</p>

<p>+880 1750-841314</p>

</div>

<hr>

<!-- INVOICE -->

<div class="top-grid">

<div>

<label>Invoice No</label>

<input
type="text"
id="invoice"
readonly>

</div>

<div>

<label>Date</label>

<input
type="text"
id="date"
readonly>

</div>

<div>

<label>Time</label>

<input
type="text"
id="time"
readonly>

</div>

</div>

<hr>

<!-- CUSTOMER -->

<h3>Customer Information</h3>

<div class="customer">

<label>Customer Name</label>

<input
type="text"
id="customer"
placeholder="Customer Name">

<label>Mobile Number</label>

<input
type="text"
id="mobile"
placeholder="01XXXXXXXXX">

</div>

<hr>

<!-- ITEM TABLE -->

<h3>Items</h3>

<table>

<thead>

<tr>

<th width="45%">Item</th>

<th width="10%">Qty</th>

<th width="20%">Unit Price</th>

<th width="20%">Total</th>

<th width="5%"></th>

</tr>

</thead>

<tbody id="itemsBody">

</tbody>

</table>

<button
type="button"
id="addItem">

+ Add Item

</button>

<hr>

<!-- SUMMARY -->

<div class="summary">

<div class="row">

<label>Subtotal</label>

<span id="subtotal">0.00</span>

</div>

<div class="row">

<label>Discount</label>

<input
type="number"
id="discount"
value="0">

</div>

<div class="row grand">

<label>Grand Total</label>

<span id="grandTotal">0.00</span>

</div>

</div>

<hr>

<!-- PAYMENT -->

<h3>Payment</h3>

<div class="payment">

<label>Payment Method</label>

<select id="payment">

<option>Cash</option>

<option>Online</option>

<option>Due</option>

</select>

<label>Paid Amount</label>

<input
type="number"
id="paid"
value="0">

<div class="due-box">

Due Amount :
<strong id="dueAmount">

0.00

</strong>

</div>

</div>

<hr>

<div class="buttons">

<button id="printBtn">

🖨 Print Receipt

</button>

<button id="clearBtn">

🗑 Clear

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
