<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK TECH Billing</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="receipt">

<!-- Header -->

<div class="header">

<img src="logo.png" class="logo">

<h1>PK TECH</h1>

<p>ISP & Networking Solution</p>

<p>+880 1750-841314</p>

</div>

<hr>

<!-- Invoice -->

<div class="invoice">

<div class="input-group">

<label>Invoice No</label>

<input
type="text"
id="invoice"
readonly>

</div>

<div class="input-group">

<label>Date</label>

<input
type="text"
id="date"
readonly>

</div>

<div class="input-group">

<label>Time</label>

<input
type="text"
id="time"
readonly>

</div>

</div>

<hr>

<!-- Customer -->

<h2>Customer Information</h2>

<div class="customer">

<div class="input-group">

<label>Customer Name</label>

<input
type="text"
id="customer"
placeholder="Enter Customer Name">

</div>

<div class="input-group">

<label>Mobile Number</label>

<input
type="text"
id="mobile"
placeholder="01XXXXXXXXX">

</div>

</div>

<hr>

<!-- Payment -->

<h2>Payment</h2>

<div class="payment">

<div class="input-group">

<label>Payment Method</label>

<select id="payment">

<option value="Cash">Cash</option>

<option value="Online Payment">Online Payment</option>

<option value="Due">Due</option>

</select>

</div>

<div class="input-group">

<label>Paid Amount</label>

<input
type="number"
id="paid"
value="0">

</div>

<div class="input-group">

<label>Due Amount</label>

<input
type="number"
id="due"
readonly
value="0">

</div>

</div>

<hr>
<!-- ========================= -->
<!-- ITEMS -->
<!-- ========================= -->

<h2>Items</h2>

<table class="item-table">

<thead>

<tr>

<th style="width:45%">Item Name</th>

<th style="width:12%">Qty</th>

<th style="width:18%">Unit Price</th>

<th style="width:20%">Total</th>

<th style="width:5%"></th>

</tr>

</thead>

<tbody id="itemBody">

</tbody>

</table>

<button
type="button"
id="addItemBtn">

+ Add Item

</button>

<hr>

<!-- ========================= -->
<!-- SUMMARY -->
<!-- ========================= -->

<div class="summary">

<div class="summary-row">

<span>Subtotal</span>

<strong id="subtotal">

৳0.00

</strong>

</div>

<div class="summary-row">

<span>Discount</span>

<input
type="number"
id="discount"
value="0"
min="0">

</div>

<div class="summary-row total-row">

<span>Grand Total</span>

<strong id="grandTotal">

৳0.00

</strong>

</div>

</div>

<hr>

<!-- ========================= -->
<!-- BUTTON -->
<!-- ========================= -->

<div class="action-buttons">

<button
id="printBtn"
type="button">

🖨️ Print Receipt

</button>

<button
id="clearBtn"
type="reset">

🗑 Clear

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
