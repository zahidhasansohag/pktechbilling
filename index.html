<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK TECH - Premium POS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0f2f5">
    <style>
        /* সাধারণ ইনপুট বক্সগুলো বড় করার জন্য */
        .form-group input[type="text"], 
        .summary-row input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .summary-row input[type="number"] {
            width: 60%;
            text-align: right;
            font-weight: bold;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        /* টেবিলের ভেতরের (Item, Qty) ইনপুট বক্স বড় করার জন্য */
        #items-table input {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            background-color: #fff;
        }
        #items-table td {
            padding: 5px;
        }

        /* রিসিট প্রিভিউ বক্সের ডিজাইন (বোল্ড ফন্ট) */
        .receipt-preview {
            width: 100%; 
            height: 350px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 13px; 
            font-weight: bold; /* Bold Font */
            color: #000;
            border: 1px solid #ccc;
            padding: 10px;
            background: #fff;
            white-space: pre;
            overflow-y: auto;
        }
    </style>
</head>
<body class="fade-in-load">

    <div id="pos-app">
        <header class="app-header premium-glass">
            <div class="brand">
                <div class="brand-info">
                    <h1>PK TECH</h1>
                    <p class="subtitle">ISP & Networking Solution</p>
                    <p class="phone">+880 1750-841314</p>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Column: Customer & Items -->
            <div class="left-col">
                <section class="card customer-card">
                    <h2 class="card-title">Billing Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Customer Name</label>
                            <input type="text" id="customer-name" placeholder="Walk-in Customer">
                        </div>
                        <div class="form-group">
                            <label>Mobile Number</label>
                            <input type="text" id="customer-mobile" placeholder="017XXXXXXXX">
                        </div>
                    </div>
                </section>

                <section class="card items-card" style="margin-top: 20px;">
                    <h2 class="card-title">Cart Items</h2>
                    <div class="table-responsive">
                        <table class="pos-table" id="items-table" style="width: 100%; text-align: left;">
                            <thead>
                                <tr>
                                    <th>Item Name</th>
                                    <th>Qty</th>
                                    <th>Unit Price (৳)</th>
                                    <th>Total (৳)</th>
                                </tr>
                            </thead>
                            <tbody id="items-body">
                                <!-- script.js থেকে আইটেম রো গুলো এখানে আসবে -->
                            </tbody>
                        </table>
                    </div>
                    <button class="btn btn-add" onclick="addItemRow()" style="margin-top: 10px; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold;">
                        + Add New Item
                    </button>
                </section>
            </div>

            <!-- Right Column: Summary & Actions -->
            <div class="right-col">
                <section class="card summary-card gradient-border">
                    <h2 class="card-title">Order Summary</h2>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="ui-subtotal">৳ 0.00</span>
                    </div>
                    <div class="summary-row grand-total" style="font-weight: bold; font-size: 1.2em;">
                        <span>Grand Total</span>
                        <span id="ui-grand-total">0.00</span>
                    </div>
                    <hr style="border: 0.5px solid #ddd; margin: 15px 0;">
                    
                    <!-- Paid and Due Section -->
                    <div class="summary-row">
                        <label style="font-weight: bold;">Paid (৳):</label>
                        <input type="number" id="paid-amount" oninput="calculateDue()" placeholder="0.00">
                    </div>
                    <div class="summary-row">
                        <label style="font-weight: bold; color: red;">Due (৳):</label>
                        <input type="number" id="due-amount" readonly style="background: #ffe6e6; color: red; font-weight: bold;">
                    </div>
                </section>

                <!-- Action Buttons -->
                <div class="action-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-print" onclick="generateReceiptText()" style="flex: 1; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;">
                        Generate Receipt
                    </button>
                    <button class="btn btn-new" onclick="location.reload()" style="flex: 1; padding: 15px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;">
                        New Bill
                    </button>
                </div>

                <!-- Thermal Copy Area -->
                <section class="card" style="margin-top:20px;">
                    <h2 class="card-title">Thermal Receipt Text</h2>
                    <textarea id="thermal-receipt-text" class="receipt-preview" readonly></textarea>
                    <button class="btn" style="width: 100%; padding: 15px; margin-top: 10px; background: #ffc107; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;" onclick="copyToClipboard()">
                        Copy For RawBT
                    </button>
                </section>
            </div>
        </main>
    </div>

    <!-- JavaScript লজিক -->
    <script>
    // অটো ডিউ ক্যালকুলেট করার লজিক
    function calculateDue() {
        let grandTotalText = document.getElementById('ui-grand-total').innerText.replace('৳', '').trim();
        let grandTotal = parseFloat(grandTotalText) || 0;
        let paidAmount = parseFloat(document.getElementById('paid-amount').value) || 0;
        
        let dueAmount = grandTotal - paidAmount;
        if(dueAmount < 0) dueAmount = 0; 
        
        document.getElementById('due-amount').value = dueAmount.toFixed(2);
    }

    // 48 ক্যারেক্টার উইডথ অনুযায়ী সেন্টারে আনার ফাংশন
    function centerText(text, width = 48) {
        if (text.length >= width) return text.substring(0, width);
        let leftPadding = Math.floor((width - text.length) / 2);
        return ' '.repeat(leftPadding) + text;
    }

    // রিসিট টেক্সট তৈরি করার লজিক (80mm = 48 characters width)
    function generateReceiptText() {
        const name = document.getElementById('customer-name').value || "Walk-in";
        const mobile = document.getElementById('customer-mobile').value || "N/A";
        
        const grandTotal = document.getElementById('ui-grand-total').innerText.replace('৳', '').trim() || "0.00";
        const paid = document.getElementById('paid-amount').value || "0.00";
        const due = document.getElementById('due-amount').value || "0.00";

        const line = "------------------------------------------------\n"; // 48 dashes
        
        let receipt = line;
        
        // 80mm উপযোগী বড় এবং বোল্ড লোগো
        receipt += centerText("PPPP  K  K  TTTTT EEEE  CCC  H  H") + "\n";
        receipt += centerText("P   P K K     T   E    C   C H  H") + "\n";
        receipt += centerText("PPPP  KK      T   EEE  C     HHHH") + "\n";
        receipt += centerText("P     K K     T   E    C   C H  H") + "\n";
        receipt += centerText("P     K  K    T   EEEE  CCC  H  H") + "\n";
        receipt += line;
        
        receipt += centerText("ISP & Networking Solution") + "\n";
        receipt += centerText("Phone: 01750-841314") + "\n";
        receipt += line;
        
        // কাস্টমার ইনফো সেন্টারে
        receipt += centerText(`Name: ${name}`) + "\n";
        receipt += centerText(`Mobile: ${mobile}`) + "\n";
        receipt += line;
        
        // আইটেম হেডার (Item=18, Qty=6, Price=10, Total=14 => Total 48)
        receipt += "Item".padEnd(18) + "Qty".padStart(6) + "Price".padStart(10) + "Total".padStart(14) + "\n";
        receipt += line;
        
        // কার্টের আইটেমগুলো অ্যাড করা
        const rows = document.querySelectorAll('#items-body tr');
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            if(inputs.length >= 3) {
                let itemName = inputs[0].value.substring(0, 17).padEnd(18);
                
                let qtyVal = parseFloat(inputs[1].value) || 0;
                let priceVal = parseFloat(inputs[2].value) || 0;
                let calculatedTotal = (qtyVal * priceVal).toString(); 
                
                let itemQty = qtyVal.toString().padStart(6);
                let itemPrice = priceVal.toString().padStart(10);
                let itemTotal = calculatedTotal.padStart(14);
                
                receipt += `${itemName}${itemQty}${itemPrice}${itemTotal}\n`;
            }
        });

        receipt += line;
        // টোটাল, পেইড, ডিউ ডান দিকে অ্যালাইন করা
        receipt += "Grand Total:".padEnd(24) + `৳ ${grandTotal}`.padStart(24) + "\n";
        receipt += "Paid Amount:".padEnd(24) + `৳ ${paid}`.padStart(24) + "\n";
        receipt += "Due Amount:".padEnd(24) + `৳ ${due}`.padStart(24) + "\n";
        receipt += line;
        
        receipt += centerText("WhatsApp: 01750-841314") + "\n";
        receipt += centerText("** THANK YOU **") + "\n";
        
        document.getElementById('thermal-receipt-text').value = receipt;
    }

    // কপি করার ফাংশন
    function copyToClipboard() {
        const copyText = document.getElementById("thermal-receipt-text");
        if(copyText.value === "") {
            alert("আগে Generate Receipt বাটনে ক্লিক করুন!");
            return;
        }
        copyText.select();
        document.execCommand("copy");
        alert("কপি হয়েছে! এখন RawBT অ্যাপে পেস্ট করুন।");
    }
    </script>
    
    <!-- আপনার existing script.js ফাইল -->
    <script src="script.js"></script>
</body>
</html>
